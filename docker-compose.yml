# docker-compose.yml — Local production-like testing with PostgreSQL
# Usage: docker-compose up -d
# Then:  docker-compose exec backend npx prisma migrate deploy

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: connect86-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/connect86
      - JWT_SECRET=local_jwt_secret_change_in_production
      - ADMIN_PASSWORD=admin123
      - CORS_ORIGIN=http://localhost:3000
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - connect86-network

  db:
    image: postgres:16-alpine
    container_name: connect86-db
    environment:
      - POSTGRES_DB=connect86
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d connect86"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - connect86-network

volumes:
  postgres_data:

networks:
  connect86-network:
    driver: bridge