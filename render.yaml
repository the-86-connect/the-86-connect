# render.yaml — Render Infrastructure as Code
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: connect86-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: connect86-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production

databases:
  - name: connect86-db
    databaseName: connect86
    ipAllowList: []