<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0c0a1a 0%, #1e1b4b 35%, #7f1d1d 100%);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    top: -150px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(239,68,68,0.3) 0%, transparent 65%);
    border-radius: 50%;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: -100px;
    left: -60px;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(239,68,68,0.15) 0%, transparent 65%);
    border-radius: 50%;
  }
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(127,29,29,0.3) 0%, transparent 60%);
    pointer-events: none;
  }
  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
  }
  .logo-mark {
    width: 56px;
    height: 56px;
    background: #ef4444;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 900;
    color: white;
    box-shadow: 0 8px 32px rgba(239,68,68,0.45);
  }
  .logo-text {
    font-size: 32px;
    font-weight: 800;
    color: white;
    letter-spacing: -0.5px;
  }
  h1 {
    font-size: 68px;
    font-weight: 900;
    color: white;
    line-height: 1.1;
    letter-spacing: -2px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
    max-width: 900px;
  }
  h1 .highlight {
    background: linear-gradient(135deg, #ef4444, #fca5a5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-size: 24px;
    color: rgba(255,255,255,0.65);
    font-weight: 400;
    line-height: 1.6;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
    max-width: 720px;
  }
  .services {
    display: flex;
    gap: 14px;
    position: relative;
    z-index: 1;
  }
  .service-tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 22px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    font-size: 18px;
    font-weight: 600;
    color: white;
  }
  .service-tag .icon {
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .service-tag.accent {
    background: rgba(239,68,68,0.18);
    border-color: rgba(239,68,68,0.35);
  }
  .url {
    position: absolute;
    bottom: 48px;
    right: 80px;
    font-size: 18px;
    color: rgba(255,255,255,0.35);
    font-weight: 500;
    z-index: 1;
    letter-spacing: 0.5px;
  }
  .decorative-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(90deg, #ef4444 0%, #f87171 50%, #ef4444 100%);
    z-index: 2;
  }
  body > * { transform: translateZ(0); }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <div style="position:relative; z-index:1; display:flex; flex-direction:column; justify-content:center; width:100%; height:100%;">
    <div class="logo-badge">
      <div class="logo-mark">86</div>
      <div class="logo-text">Connects</div>
    </div>

    <h1>Your Gateway to <span class="highlight">China</span></h1>

    <p class="subtitle">Professional services for Study in China assistance and Product Sourcing from trusted Chinese manufacturers.</p>

    <div class="services">
      <div class="service-tag accent">
        <span class="icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        </span>
        Study in China
      </div>
      <div class="service-tag">
        <span class="icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        </span>
        Product Sourcing
      </div>
    </div>

    <div class="url">the86connects.com</div>
  </div>
  <div class="decorative-line"></div>
</body>
</html>
